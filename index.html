<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Phase & Tilt Canvas Modifier</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-color: #1f2833;
            --accent-color: #c5a059;
            --text-color: #c5c6c7;
            --text-bright: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            font-size: 22px; 
            font-weight: 300; 
            letter-spacing: 0.15em; 
            color: var(--text-bright); 
            margin: 10px 0 5px 0; 
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            align-items: center;
        }

        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
                justify-content: center;
                align-items: flex-start;
            }
        }

        /* 左側のビジュアルエリア用カラム */
        .visual-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 450px;
        }

        .panel { 
            background: var(--panel-color); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .control-group { 
            margin-bottom: 20px; 
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: var(--accent-color);
            font-weight: bold;
        }

        .monitor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .monitor-header label {
            margin-bottom: 0;
        }
        
        .lock-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-color);
            cursor: pointer;
            user-select: none;
        }
        .lock-container input {
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .size-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .size-input-wrapper {
            flex: 1;
        }
        .size-input-wrapper input {
            width: 100%;
            background: #121821;
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: var(--text-bright);
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
        }
        .size-input-wrapper input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        .file-dropzone {
            border: 1px dashed rgba(197, 160, 89, 0.4);
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s;
            word-break: break-all;
            font-size: 13px;
        }
        .file-dropzone:hover {
            border-color: var(--accent-color);
            background: rgba(197, 160, 89, 0.05);
        }
        .file-dropzone input { display: none; }

        input[type="range"] { 
            width: 100%; 
            -webkit-appearance: none;
            background: #121821;
            height: 6px;
            border-radius: 3px;
            outline: none;
            margin: 10px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .step-display {
            font-size: 24px;
            font-weight: 200;
            color: var(--text-bright);
            font-family: monospace;
            text-align: center;
            margin-bottom: 10px;
        }

        .age-display {
            font-size: 13px;
            color: var(--text-color);
            text-align: center;
            margin-top: 5px;
            letter-spacing: 0.05em;
        }
        .age-display strong {
            color: var(--accent-color);
            font-family: monospace;
            font-size: 15px;
        }

        .btn { 
            display: block;
            width: 100%;
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--text-bright);
            padding: 14px; 
            font-size: 13px; 
            letter-spacing: 0.1em;
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s;
            margin-bottom: 12px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover, .btn:active { 
            background: var(--accent-color); 
            color: var(--bg-color);
        }
        .btn-bulk {
            background: rgba(197, 160, 89, 0.1);
        }

        #canvasContainer { 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            background-image: linear-gradient(45deg, #161a1d 25%, transparent 25%, transparent 75%, #161a1d 75%), 
                              linear-gradient(45deg, #161a1d 25%, #0b0c10 25%, #0b0c10 75%, #161a1d 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            width: 100%;
        }
        #moonCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .info-text { 
            font-size: 11px; 
            color: #666; 
            text-align: center; 
            margin-top: 15px; 
            line-height: 1.6;
        }
        
        #progressOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.95);
            z-index: 1000;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }
        .spinner {
            border: 3px solid #1f2833;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        #simCanvas {
            cursor: grab; /* 掴めることを示す */
        }
        #simCanvas:active {
            cursor: grabbing; /* 掴んでいる状態を示す */
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>Moon Phase Crop</h1>
    <div class="subtitle">Continuous Moon Phase & Tilt Modifier</div>

    <div class="app-container">
        
        <div class="visual-column">
            <div id="canvasContainer">
                <canvas id="moonCanvas" width="2520" height="2992"></canvas>
            </div>

            <div class="panel" style="padding: 20px;">
                <label style="text-align: center; margin-bottom: 15px;">Celestial Sphere Simulator</label>
                <div style="text-align: center; font-size: 10px; color: var(--accent-color); margin-bottom: 10px; opacity: 0.8; letter-spacing: 0.1em;">
                    <span style="font-size: 14px; vertical-align: middle;">⟳</span> 左右にドラッグして時間を回す
                </div>
                <canvas id="simCanvas" width="800" height="800" style="width: 100%; background: #121821; border-radius: 6px; border: 1px solid rgba(197, 160, 89, 0.2);"></canvas>
            </div>
        </div>

        <div class="panel">
            <div class="control-group">
                <div class="monitor-header">
                    <label>1. Source Image</label>
                    <div style="display: flex; gap: 12px;">
                        <label class="lock-container">
                            <input type="checkbox" id="rotateTextureCheckbox">
                            <span style="font-weight: bold;">Rotate</span>
                        </label>
                        <label class="lock-container">
                            <input type="checkbox" id="colorSimCheckbox" checked>
                            <span style="font-weight: bold;">Color Sim</span>
                        </label>
                    </div>
                </div>
                <div class="file-dropzone" onclick="document.getElementById('fileInput').click()">
                    <span id="fileLabel">Tap to Upload Image</span>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
            </div>


            <div class="control-group">
                <label>2. Canvas Resolution (px)</label>
                <div class="size-input-container">
                    <div class="size-input-wrapper">
                        <input type="number" id="inputWidth" value="2520" min="100" max="8000" placeholder="Width">
                    </div>
                    <div style="font-size: 12px; color: var(--accent-color);">×</div>
                    <div class="size-input-wrapper">
                        <input type="number" id="inputHeight" value="2992" min="100" max="8000" placeholder="Height">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>3. Glow Intensity (<span id="glowVal">100</span>%)</label>
                <input type="range" id="glowSlider" min="0" max="200" value="100">
            </div>

            <div class="control-group">
                <label>4. Celestial Time (<span id="timeVal">18:00</span>)</label>
                <input type="range" id="timeSlider" min="0" max="23.9" step="0.1" value="18.0">
            </div>

            <div class="control-group">
                <label>5. Moon Phase Monitor</label>
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
                    <div class="step-display" style="margin-bottom: 0;">PHASE <span id="stepVal">14.0</span> / 28</div>
                    <label class="lock-container" style="padding-bottom: 4px;">
                        <input type="checkbox" id="lockCheckbox" checked>
                        <span style="font-weight: bold; letter-spacing: 0.05em;">Integer Lock</span>
                    </label>
                </div>
                <input type="range" id="stepSlider" min="0" max="27.9" step="1" value="14">
                <div class="age-display">およその月齢: <strong><span id="ageRangeVal">14.3 〜 15.3</span></strong> 頃</div>
                <div class="age-display" style="margin-top: 2px;">シミュレーション傾斜角: <strong><span id="tiltAngleVal">0.0</span>°</strong></div>
            </div>

            <div class="control-group" style="margin-top: 30px;">
                <label>6. Export Matrix</label>
                <button class="btn" id="downloadBtn">Save Current Phase</button>
                <button class="btn btn-bulk" id="bulkDownloadBtn">Save All 28 Default Phases (.zip)</button>
            </div>
            
            <div class="info-text">
                ※ 模様の回転状態・傾き情報を含んだ透過PNGが出力されます。<br>
                （Glow 0% の場合、PHASE 0.0 は完全に透明になります）
            </div>
        </div>
    </div>

    <div id="progressOverlay">
        <div class="spinner"></div>
        <div id="progressText" style="letter-spacing: 0.1em; font-size: 13px; text-align: center; padding: 0 20px;">Generating Moon Phase... (0/28)</div>
    </div>

    <script>
        const canvas = document.getElementById('moonCanvas');
        const ctx = canvas.getContext('2d');
        const simCanvas = document.getElementById('simCanvas');
        const simCtx = simCanvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const slider = document.getElementById('stepSlider');
        const stepVal = document.getElementById('stepVal');
        const ageRangeVal = document.getElementById('ageRangeVal');
        const tiltAngleVal = document.getElementById('tiltAngleVal');
        const glowSlider = document.getElementById('glowSlider');
        const glowVal = document.getElementById('glowVal');
        const timeSlider = document.getElementById('timeSlider');
        const timeVal = document.getElementById('timeVal');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const downloadBtn = document.getElementById('downloadBtn');
        const bulkDownloadBtn = document.getElementById('bulkDownloadBtn');
        const progressOverlay = document.getElementById('progressOverlay');
        const progressText = document.getElementById('progressText');
        const lockCheckbox = document.getElementById('lockCheckbox');
        const rotateTextureCheckbox = document.getElementById('rotateTextureCheckbox');
        const colorSimCheckbox = document.getElementById('colorSimCheckbox'); // ★追加


        const inputWidth = document.getElementById('inputWidth');
        const inputHeight = document.getElementById('inputHeight');

        let userImage = null;

        updateAgeDisplay(parseFloat(slider.value));
        updateCanvasSize();

        inputWidth.addEventListener('change', updateCanvasSize);
        inputHeight.addEventListener('change', updateCanvasSize);

        function updateCanvasSize() {
            let w = parseInt(inputWidth.value) || 2520;
            let h = parseInt(inputHeight.value) || 2992;
            
            if (w < 100) w = 100;
            if (h < 100) h = 100;

            canvas.width = w;
            canvas.height = h;
            container.style.aspectRatio = `${w} / ${h}`;

            draw(parseFloat(slider.value));
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileLabel.innerText = file.name.length > 25 ? file.name.substring(0,22) + '...' : file.name;
                const reader = new FileReader();
                reader.onload = (event) => {
                    userImage = new Image();
                    userImage.onload = () => { draw(parseFloat(slider.value)); };
                    userImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        lockCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                const currentVal = parseFloat(slider.value);
                const roundedVal = Math.round(currentVal);
                slider.step = "1";
                slider.value = roundedVal;
                
                stepVal.innerText = roundedVal.toFixed(1);
                updateAgeDisplay(roundedVal);
                draw(roundedVal);
            } else {
                slider.step = "0.1";
            }
        });

        rotateTextureCheckbox.addEventListener('change', () => {
            draw(parseFloat(slider.value));
        });

        // ★追加
        colorSimCheckbox.addEventListener('change', () => {
            draw(parseFloat(slider.value));
        });


        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            stepVal.innerText = val.toFixed(1);
            updateAgeDisplay(val);
            draw(val);
        });

        timeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            const hours = Math.floor(val);
            const minutes = Math.floor((val % 1) * 60);
            timeVal.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            draw(parseFloat(slider.value));
        });

        function updateAgeDisplay(phase) {
            const maxCycle = 29.53;
            const centerAge = (phase / 28) * maxCycle;
            
            let minAge = centerAge - 0.5;
            let maxAge = centerAge + 0.5;

            if (minAge < 0) {
                const part1Min = minAge + maxCycle;
                const part1Max = maxCycle;
                const part2Min = 0.0;
                const part2Max = maxAge;
                ageRangeVal.innerText = `${part1Min.toFixed(1)}〜${part1Max.toFixed(1)} , ${part2Min.toFixed(1)}〜${part2Max.toFixed(1)}`;
            } else if (maxAge > maxCycle) {
                const part1Min = minAge;
                const part1Max = maxCycle;
                const part2Min = 0.0;
                const part2Max = maxAge - maxCycle;
                ageRangeVal.innerText = `${part1Min.toFixed(1)}〜${part1Max.toFixed(1)} , ${part2Min.toFixed(1)}〜${part2Max.toFixed(1)}`;
            } else {
                ageRangeVal.innerText = `${minAge.toFixed(1)} 〜 ${maxAge.toFixed(1)}`;
            }
        }

        // 天体モデルによる月の傾き（ラジアン）計算
        function calculateMoonTilt(phase, timeHour) {
            let moonHourPosition = timeHour - (phase / 28) * 24;
            while (moonHourPosition < 0) moonHourPosition += 24;
            while (moonHourPosition >= 24) moonHourPosition -= 24;

            let tiltDeg = (moonHourPosition - 12) * 15;
            return tiltDeg * (Math.PI / 180);
        }

        // --- 空の色を計算する関数（完全対称・クールトーン版） ---
        function getSkyColor(hour) {
            const stops = [
                
                { h: 0,   r: 50,  g: 60,  b: 90 },   // 北中（少し明るいネイビー）
                { h: 4.5, r: 50,  g: 70,  b: 100 },   // 夜明け前
                { h: 6.0, r: 50,  g: 70,  b: 120 },   // 日の出（ブルーアワーの非常に深い濃紺）
                { h: 6.5, r: 60,  g: 70,  b: 150 },   // 日の出直後（少しずつ明るい濃紺へ）
                { h: 8.0, r: 100, g: 150, b: 210 },  // 朝（深みのある青から徐々に明るく）
                { h: 12.0, r: 160, g: 215, b: 255 }, // 南中（明るく白っぽく抜けた青空）
                { h: 16.0, r: 100, g: 150, b: 210 }, // 午後（少しずつ深みのある青へ沈む）
                { h: 17.5, r: 60,  g: 70,  b: 150 },  // 日の入り間近（空全体が暗い青・濃紺へ）
                { h: 18.0, r: 50,  g: 70,  b: 120 },  // 日没直後（ここも合わせる）
                { h: 19.5, r: 50,  g: 70,  b: 100 },  // 夜の始まり
                { h: 24,   r: 50,  g: 60,  b: 90 }    // 北中
            ];

            let start = stops[0], end = stops[stops.length - 1];
            for (let i = 0; i < stops.length - 1; i++) {
                if (hour >= stops[i].h && hour <= stops[i+1].h) {
                    start = stops[i];
                    end = stops[i+1];
                    break;
                }
            }

            const range = end.h - start.h;
            const progress = range === 0 ? 0 : (hour - start.h) / range;

            const r = Math.round(start.r + (end.r - start.r) * progress);
            const g = Math.round(start.g + (end.g - start.g) * progress);
            const b = Math.round(start.b + (end.b - start.b) * progress);

            return `rgb(${r}, ${g}, ${b})`;
        }

        // --- 全天球シミュレーターの描画（二重軌道版） ---
        function drawSimulator(phase, timeHour) {
            const w = simCanvas.width;
            const h = simCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const rSun = (w / 2) - 80;   // 太陽の軌道半径（外）
            const rMoon = rSun * 0.75;   // 月の軌道半径（内）

            simCtx.clearRect(0, 0, w, h);

            // 1. 背景色の塗りつぶし
            simCtx.beginPath();
            simCtx.arc(cx, cy, rSun + 50, 0, Math.PI * 2);
            simCtx.fillStyle = getSkyColor(timeHour);
            simCtx.fill();

            // 地下を暗く
            simCtx.beginPath();
            simCtx.arc(cx, cy, rSun + 50, 0, Math.PI);
            simCtx.fillStyle = 'rgba(30, 30, 30, 0.2)';
            simCtx.fill();

            // 軌道ガイド線
            simCtx.beginPath();
            simCtx.arc(cx, cy, rSun, 0, Math.PI * 2);
            simCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            simCtx.stroke();
            simCtx.beginPath();
            simCtx.arc(cx, cy, rMoon, 0, Math.PI * 2);
            simCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            simCtx.stroke();

            // 2. 座標計算
            const sunAngleRad = (timeHour - 18) * 15 * (Math.PI / 180);
            const sunPos = {
                x: cx + rSun * Math.cos(sunAngleRad),
                y: cy + rSun * Math.sin(sunAngleRad)
            };

            // 月の角度：太陽の角度からPHASE分だけ遅れる
            const moonAngleRad = sunAngleRad - (phase / 28) * 2 * Math.PI;
            const moonPos = {
                x: cx + rMoon * Math.cos(moonAngleRad),
                y: cy + rMoon * Math.sin(moonAngleRad)
            };

            // 光のベクトル線
            simCtx.beginPath();
            simCtx.moveTo(sunPos.x, sunPos.y);
            simCtx.lineTo(moonPos.x, moonPos.y);
            simCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            simCtx.setLineDash([8, 8]);
            simCtx.stroke();
            simCtx.setLineDash([]);

            // 3. 描画
            // 月の描画
            simCtx.beginPath();
            simCtx.arc(moonPos.x, moonPos.y, 16, 0, Math.PI * 2);
            simCtx.fillStyle = (moonPos.y > cy) ? '#0b0c10' : '#1f2833';
            simCtx.fill();
            simCtx.strokeStyle = (moonPos.y > cy) ? '#444' : '#fff';
            simCtx.stroke();

            // 太陽の描画
            simCtx.beginPath();
            simCtx.arc(sunPos.x, sunPos.y, 20, 0, Math.PI * 2);
            simCtx.fillStyle = (sunPos.y > cy) ? '#66532d' : '#f9d71c';
            simCtx.fill();
            if (sunPos.y <= cy) {
                simCtx.shadowColor = '#f9d71c';
                simCtx.shadowBlur = 20;
                simCtx.fill();
                simCtx.shadowBlur = 0;
            }
        }

        glowSlider.addEventListener('input', (e) => {
            glowVal.innerText = e.target.value;
            draw(parseFloat(slider.value));
        });

        function triggerDownload(url, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = url;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        downloadBtn.addEventListener('click', () => {
            const currentStep = parseFloat(slider.value);
            const currentTime = parseFloat(timeSlider.value);
            const dataUrl = canvas.toDataURL('image/png');
            const fileSuffix = String(currentStep.toFixed(1)).replace('.', '_');
            const timeSuffix = String(currentTime.toFixed(1)).replace('.', '_');
            triggerDownload(dataUrl, `moon_phase_${fileSuffix}_t${timeSuffix}.png`);
        });

        bulkDownloadBtn.addEventListener('click', async () => {
            progressOverlay.style.display = 'flex';
            const zip = new JSZip();
            const currentSelectedStep = parseFloat(slider.value);

            for (let i = 0; i <= 27; i++) {
                progressText.innerText = `Generating Default Moon Phases...\nPhase ${i} / 27`;
                
                draw(i);
                
                const dataUrl = canvas.toDataURL('image/png');
                const base64Data = dataUrl.split(',')[1];
                zip.file(`moon_phase_${String(i).padStart(2, '0')}.png`, base64Data, {base64: true});
                
                await new Promise(resolve => setTimeout(resolve, 60));
            }

            draw(currentSelectedStep);

            progressText.innerText = `Archiving ZIP File...\nPlease wait.`;
            const content = await zip.generateAsync({type: 'blob'});
            
            const blobUrl = URL.createObjectURL(content);
            triggerDownload(blobUrl, `moon_phase_28_matrix.zip`);
            
            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);

            progressOverlay.style.display = 'none';
        });

        function draw(step) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = (Math.min(canvas.width, canvas.height) / 2) * 0.87; 
            const glowRatio = parseInt(glowSlider.value) / 100;
            const timeHour = parseFloat(timeSlider.value);
            const shouldRotateTexture = rotateTextureCheckbox.checked;

            const tiltRad = calculateMoonTilt(step, timeHour);
            let tiltDeg = (tiltRad * (180 / Math.PI)) % 360;
            if (tiltDeg < 0) tiltDeg += 360;
            tiltAngleVal.innerText = tiltDeg.toFixed(1);

            drawSimulator(step, timeHour);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (glowRatio === 0 && step === 0) {
                return;
            }

            function pathMoon(context) {
                const radians = step * (Math.PI / 14);
                const phase = -Math.cos(radians);
                const isWaxing = step <= 14; 
                
                context.beginPath();
                context.arc(cx, cy, r, -Math.PI/2, Math.PI/2, !isWaxing);
                context.ellipse(cx, cy, Math.abs(phase) * r, r, 0, Math.PI/2, -Math.PI/2, isWaxing ? (phase < 0) : (phase > 0));
                context.closePath();
            }

            const imgBuffer = document.createElement('canvas');
            imgBuffer.width = canvas.width;
            imgBuffer.height = canvas.height;
            const ictx = imgBuffer.getContext('2d');

            if (userImage) {
                // 月の直径を計算
                const moonDiameter = r * 2;
                const imgRatio = userImage.width / userImage.height;
                let renderW, renderH;

                // 月の円形（正方形のバウンディングボックス）にぴったり合わせる計算
                if (imgRatio > 1) {
                    // 横長画像：高さを月の直径に合わせ、横幅を比率で伸ばす
                    renderH = moonDiameter;
                    renderW = moonDiameter * imgRatio;
                } else {
                    // 縦長・正方形画像：横幅を月の直径に合わせ、高さを比率で伸ばす
                    renderW = moonDiameter;
                    renderH = moonDiameter / imgRatio;
                }

                // テクスチャ回転ONの場合は、描画前にコンテキストを回転させる
                ictx.save();
                if (shouldRotateTexture) {
                    ictx.translate(cx, cy);
                    ictx.rotate(tiltRad);
                    ictx.translate(-cx, -cy);
                }
                ictx.drawImage(userImage, cx - renderW / 2, cy - renderH / 2, renderW, renderH);
                ictx.restore();
                
            } else {
                ictx.fillStyle = '#1f2833';
                ictx.fillRect(0, 0, canvas.width, canvas.height);
                ictx.fillStyle = '#666';
                ictx.font = `${Math.min(canvas.width, canvas.height) * 0.025}px sans-serif`;
                ictx.textAlign = 'center';
                ictx.textBaseline = 'middle';
                ictx.fillText('Source Image Missing', cx, cy);
            }
            // ==========================================
            // ★ ここから月の色シミュレーションを追加 ★
            // ==========================================
            if (colorSimCheckbox.checked) {
                ictx.save();
                
                // 月と太陽の現在の天球座標（Y軸）を計算
                let moonHour = timeHour - (step / 28) * 24;
                while (moonHour < 0) moonHour += 24;
                while (moonHour >= 24) moonHour -= 24;

                const moonAngleRad = (moonHour - 18) * 15 * (Math.PI / 180);
                const sunAngleRad = (timeHour - 18) * 15 * (Math.PI / 180);
                
                // Yがプラスなら地平線より下（沈んでいる）
                const moonY = Math.sin(moonAngleRad); 
                const sunY = Math.sin(sunAngleRad);   

                ictx.globalCompositeOperation = 'source-atop';
                
                if (moonY > 0) {
                    // 月が地平線の下に沈んでいる状態（影のように暗く）
                    ictx.fillStyle = 'rgba(15, 15, 15, 0.5)';
                } else if (sunY > 0) {
                    // 夜（月が上、太陽が下）：ほんのり黄色く発光感を足す
                    ictx.fillStyle = 'rgba(255, 240, 150, 0.5)';
                } else {
                    // 昼（月も太陽も上）：青空に溶け込むように白くウォッシュアウト
                    ictx.fillStyle = 'rgba(240, 240, 240, 0.6)';
                }
                
                ictx.fillRect(0, 0, canvas.width, canvas.height);
                ictx.restore();
            }


            if (step === 0) {
                ctx.save();
                const maskCtx = imgBuffer.getContext('2d');
                maskCtx.globalCompositeOperation = 'destination-in';
                maskCtx.beginPath();
                maskCtx.arc(cx, cy, r, 0, Math.PI * 2);
                maskCtx.fill();

                const dynamicBlur1 = (r / 1100) * 80 * glowRatio;
                
                if (dynamicBlur1 > 0) {
                    ctx.filter = `blur(${dynamicBlur1}px)`; 
                    ctx.drawImage(imgBuffer, 0, 0); 
                }
                ctx.restore();

                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(cx, cy, r - ((r / 1100) * 5), 0, Math.PI * 2); 
                ctx.fill();
                ctx.restore();
                return;
            }

            const shadowBuffer = document.createElement('canvas');
            shadowBuffer.width = canvas.width;
            shadowBuffer.height = canvas.height;
            const sctx = shadowBuffer.getContext('2d');
            
            sctx.drawImage(imgBuffer, 0, 0);
            sctx.globalCompositeOperation = 'destination-in';
            
            sctx.save();
            sctx.translate(cx, cy);
            sctx.rotate(tiltRad);
            sctx.translate(-cx, -cy);
            
            pathMoon(sctx);
            sctx.fillStyle = '#ffffff';
            sctx.fill();
            sctx.restore();

            const dynamicBlur2 = (r / 1100) * 60 * glowRatio;
            if (dynamicBlur2 > 0) {
                ctx.save();
                ctx.filter = `blur(${dynamicBlur2}px)`; 
                ctx.drawImage(shadowBuffer, 0, 0);
                ctx.restore();
            }

            ctx.drawImage(shadowBuffer, 0, 0);
        }
let isDragging = false;
        let lastMouseX = 0; // 前回のマウス位置を保持

        // --- ドラッグ操作ロジック（回転ホイール型） ---
        function handlePointerMove(e) {
            if (!isDragging) return;
            e.preventDefault();

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            
            // 今回の移動量を計算（前回の位置との差分）
            const deltaX = clientX - lastMouseX;
            
            // 移動量を角度の変化量に変換（係数は適宜調整：値を大きくすると速く回る）
            const rotationSpeed = 0.5; 
            const angleChange = deltaX * rotationSpeed * (Math.PI / 180);
            
            // 現在の時間を角度(rad)に変換し、変化量を加算
            let currentHour = parseFloat(timeSlider.value);
            let currentAngle = (currentHour - 12) * (Math.PI / 12);
            let newAngle = currentAngle + angleChange;
            
            // 時間に再変換
            let newHour = 12 + (newAngle * (12 / Math.PI));
            newHour = (newHour + 24) % 24;

            // スライダーと表示を更新
            timeSlider.value = newHour;
            const hours = Math.floor(newHour);
            const minutes = Math.floor((newHour % 1) * 60);
            timeVal.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            draw(parseFloat(slider.value));

            // 現在の位置を更新
            lastMouseX = clientX;
        }

        // --- 操作のリスナー設定 ---
        simCanvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX; // 開始位置を記録
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) handlePointerMove(e);
        });
        
        window.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        // タッチ操作用
        simCanvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastMouseX = e.touches[0].clientX;
            e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('touchmove', (e) => {
            if (isDragging) handlePointerMove(e);
            e.preventDefault();
        }, {passive: false});
    </script>
</body>
