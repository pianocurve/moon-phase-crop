<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Phase & Tilt Canvas Modifier</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-color: #1f2833;
            --accent-color: #c5a059;
            --text-color: #c5c6c7;
            --text-bright: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            padding: 40px 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 { 
            font-size: 26px; 
            font-weight: 300; 
            letter-spacing: 0.15em; 
            color: var(--text-bright); 
            margin: 0 0 5px 0; 
            text-transform: uppercase;
            text-align: center;
        }

        .subtitle {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            margin-bottom: 40px;
            text-align: center;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1400px;
            justify-content: center;
        }

        @media (min-width: 1024px) {
            .app-container {
                grid-template-columns: minmax(320px, 450px) minmax(280px, 380px) 1fr;
                align-items: start;
            }
            .app-container > :nth-child(1) { grid-column: 1; }
            .app-container > :nth-child(2) { grid-column: 2; }
            .app-container > :nth-child(3) { grid-column: 3; }
        }

        .panel { 
            background: var(--panel-color); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            box-sizing: border-box;
        }

        .control-group { 
            margin-bottom: 24px; 
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: var(--accent-color);
            font-weight: bold;
        }

        .monitor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .monitor-header label {
            margin-bottom: 0;
        }
        
        .lock-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--text-color);
            cursor: pointer;
            user-select: none;
        }
        .lock-container input {
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .size-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .size-input-wrapper {
            flex: 1;
        }
        .size-input-wrapper input {
            width: 100%;
            background: #121821;
            border: 1px solid rgba(197, 160, 89, 0.3);
            color: var(--text-bright);
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
        }
        .size-input-wrapper input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        .file-dropzone {
            border: 1px dashed rgba(197, 160, 89, 0.4);
            padding: 25px 20px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s;
            word-break: break-all;
            font-size: 13px;
        }
        .file-dropzone:hover {
            border-color: var(--accent-color);
            background: rgba(197, 160, 89, 0.05);
        }
        .file-dropzone input { display: none; }

        input[type="range"] { 
            width: 100%; 
            -webkit-appearance: none;
            background: #121821;
            height: 6px;
            border-radius: 3px;
            outline: none;
            margin: 12px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .step-display {
            font-size: 24px;
            font-weight: 200;
            color: var(--text-bright);
            font-family: monospace;
            text-align: center;
            margin-bottom: 10px;
        }

        .age-display {
            font-size: 13px;
            color: var(--text-color);
            text-align: center;
            margin-top: 6px;
            letter-spacing: 0.05em;
        }
        .age-display strong {
            color: var(--accent-color);
            font-family: monospace;
            font-size: 15px;
        }

        .btn { 
            display: block;
            width: 100%;
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--text-bright);
            padding: 14px; 
            font-size: 13px; 
            letter-spacing: 0.1em;
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.3s;
            margin-bottom: 12px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover, .btn:active { 
            background: var(--accent-color); 
            color: var(--bg-color);
        }
        .btn-bulk {
            background: rgba(197, 160, 89, 0.1);
        }

        #canvasContainer { 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            background-image: linear-gradient(45deg, #161a1d 25%, transparent 25%, transparent 75%, #161a1d 75%), 
                              linear-gradient(45deg, #161a1d 25%, #0b0c10 25%, #0b0c10 75%, #161a1d 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            width: 100%;
        }
        #moonCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .info-text { 
            font-size: 11px; 
            color: #7a828a; 
            text-align: center; 
            margin-top: 20px; 
            line-height: 1.6;
        }
        
        #progressOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.95);
            z-index: 1000;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }
        .spinner {
            border: 3px solid #1f2833;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        #simCanvas {
            cursor: grab;
        }
        #simCanvas:active {
            cursor: grabbing;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>Moon Phase Crop</h1>
    <div class="subtitle">Continuous Moon Phase & Tilt Modifier</div>

    <div class="app-container">
        
        <div id="canvasContainer">
            <canvas id="moonCanvas" width="2520" height="2992"></canvas>
        </div>

        <div class="panel" style="padding: 20px;">
            <label style="text-align: center; margin-bottom: 15px;">Celestial Sphere Simulator</label>
            <div style="text-align: center; font-size: 10px; color: var(--accent-color); margin-bottom: 12px; opacity: 0.8; letter-spacing: 0.1em;">
                <span style="font-size: 14px; vertical-align: middle;">⟳</span> 左右にドラッグして時間を回す
            </div>
            <canvas id="simCanvas" width="800" height="800" style="width: 100%; background: #121821; border-radius: 6px; border: 1px solid rgba(197, 160, 89, 0.2);"></canvas>
        </div>

        <div class="panel">
            <div class="control-group">
                <div class="monitor-header">
                    <label>1. Source Image</label>
                    <div style="display: flex; gap: 12px;">
                        <label class="lock-container">
                            <input type="checkbox" id="rotateTextureCheckbox">
                            <span style="font-weight: bold;">Rotate</span>
                        </label>
                        <label class="lock-container">
                            <input type="checkbox" id="colorSimCheckbox" checked>
                            <span style="font-weight: bold;">Color Sim</span>
                        </label>
                    </div>
                </div>
                <div class="file-dropzone" onclick="document.getElementById('fileInput').click()">
                    <span id="fileLabel">Tap to Upload Image</span>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
            </div>

            <div class="control-group">
                <label>2. Canvas Resolution (px)</label>
                <div class="size-input-container">
                    <div class="size-input-wrapper">
                        <input type="number" id="inputWidth" value="2520" min="100" max="8000" placeholder="Width">
                    </div>
                    <div style="font-size: 12px; color: var(--accent-color);">×</div>
                    <div class="size-input-wrapper">
                        <input type="number" id="inputHeight" value="2992" min="100" max="8000" placeholder="Height">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>3. Glow Intensity (<span id="glowVal">100</span>%)</label>
                <input type="range" id="glowSlider" min="0" max="200" value="100">
            </div>

            <div class="control-group">
                <label>4. Celestial Time (<span id="timeVal">18:00</span>)</label>
                <input type="range" id="timeSlider" min="0" max="23.9" step="0.1" value="18.0">
            </div>

            <div class="control-group">
                <label>5. Observation Month (<span id="monthVal">6</span>月)</label>
                <input type="range" id="monthSlider" min="1" max="12" step="1" value="6">
            </div>

            <div class="control-group">
                <label>6. Moon Phase Monitor</label>
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
                    <div class="step-display" style="margin-bottom: 0;">PHASE <span id="stepVal">14.0</span> / 28</div>
                    <label class="lock-container" style="padding-bottom: 4px;">
                        <input type="checkbox" id="lockCheckbox" checked>
                        <span style="font-weight: bold; letter-spacing: 0.05em;">Integer Lock</span>
                    </label>
                </div>
                <input type="range" id="stepSlider" min="0" max="27.9" step="1" value="14">
                <div class="age-display">およそ月齢: <strong><span id="ageRangeVal">14.3 〜 15.3</span></strong> 頃</div>
                <div class="age-display" style="margin-top: 2px;">シミュレーション傾斜角: <strong><span id="tiltAngleVal">0.0</span>°</strong></div>
            </div>

            <div class="control-group" style="margin-top: 30px;">
                <label>7. Export Matrix</label>
                <button class="btn" id="downloadBtn">Save Current Phase</button>
                <button class="btn btn-bulk" id="bulkDownloadBtn">Save All 28 Default Phases (.zip)</button>
            </div>
            
            <div class="info-text">
                ※ 模様の回転状態・傾き情報を含んだ透過PNGが出力されます。<br>
                （Glow 0% の場合、PHASE 0.0 は完全に透明になります）
            </div>
        </div>
    </div>

    <div id="progressOverlay">
        <div class="spinner"></div>
        <div id="progressText" style="letter-spacing: 0.1em; font-size: 13px; text-align: center; padding: 0 20px;">Generating Moon Phase... (0/28)</div>
    </div>

    <script>
        const canvas = document.getElementById('moonCanvas');
        const ctx = canvas.getContext('2d');
        const simCanvas = document.getElementById('simCanvas');
        const simCtx = simCanvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const slider = document.getElementById('stepSlider');
        const stepVal = document.getElementById('stepVal');
        const ageRangeVal = document.getElementById('ageRangeVal');
        const tiltAngleVal = document.getElementById('tiltAngleVal');
        const glowSlider = document.getElementById('glowSlider');
        const glowVal = document.getElementById('glowVal');
        const timeSlider = document.getElementById('timeSlider');
        const timeVal = document.getElementById('timeVal');
        const monthSlider = document.getElementById('monthSlider');
        const monthVal = document.getElementById('monthVal');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const downloadBtn = document.getElementById('downloadBtn');
        const bulkDownloadBtn = document.getElementById('bulkDownloadBtn');
        const progressOverlay = document.getElementById('progressOverlay');
        const progressText = document.getElementById('progressText');
        const lockCheckbox = document.getElementById('lockCheckbox');
        const rotateTextureCheckbox = document.getElementById('rotateTextureCheckbox');
        const colorSimCheckbox = document.getElementById('colorSimCheckbox');

        const inputWidth = document.getElementById('inputWidth');
        const inputHeight = document.getElementById('inputHeight');

        let userImage = null;

        // 【復旧】キャンバス解像度およびアスペクト比の動的変更関数
        function updateCanvasSize() {
            let w = parseInt(inputWidth.value) || 2520;
            let h = parseInt(inputHeight.value) || 2992;
            
            if (w < 100) w = 100;
            if (h < 100) h = 100;

            canvas.width = w;
            canvas.height = h;
            container.style.aspectRatio = `${w} / ${h}`;

            draw(parseFloat(slider.value));
        }

        // 初期実行
        updateCanvasSize();
        updateAgeDisplay(parseFloat(slider.value));

        // イベントリスナー登録一覧
        inputWidth.addEventListener('change', updateCanvasSize);
        inputHeight.addEventListener('change', updateCanvasSize);

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileLabel.innerText = file.name.length > 25 ? file.name.substring(0,22) + '...' : file.name;
                const reader = new FileReader();
                reader.onload = (event) => {
                    userImage = new Image();
                    userImage.onload = () => { draw(parseFloat(slider.value)); };
                    userImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        lockCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                const currentVal = parseFloat(slider.value);
                const roundedVal = Math.round(currentVal);
                slider.step = "1";
                slider.value = roundedVal;
                
                stepVal.innerText = roundedVal.toFixed(1);
                updateAgeDisplay(roundedVal);
                draw(roundedVal);
            } else {
                slider.step = "0.1";
            }
        });

        rotateTextureCheckbox.addEventListener('change', () => {
            draw(parseFloat(slider.value));
        });

        colorSimCheckbox.addEventListener('change', () => {
            draw(parseFloat(slider.value));
        });

        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            stepVal.innerText = val.toFixed(1);
            updateAgeDisplay(val);
            draw(val);
        });

        // 時間スライダー（テキスト表示と同期連動処理）
        timeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            const hours = Math.floor(val);
            const minutes = Math.floor((val % 1) * 60);
            const formattedTime = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            const targetTimeVal = document.getElementById('timeVal');
            if (targetTimeVal) {
                targetTimeVal.innerText = formattedTime;
            }
            timeVal.innerText = formattedTime;
            
            draw(parseFloat(slider.value));
        });

        // 【復旧】グロースライダー移動時の即時描画反映処理
        glowSlider.addEventListener('input', (e) => {
            glowVal.innerText = e.target.value;
            draw(parseFloat(slider.value));
        });

        // 季節スライダー（日の出入り案内表示）
        monthSlider.addEventListener('input', (e) => {
            monthVal.innerText = e.target.value;
            
            let month = parseInt(e.target.value);
            let seasonOffset = Math.sin(((month - 3.2) / 12) * 2 * Math.PI); 
            let sunrise = 5.61 - (1.1 * seasonOffset); 
            let sunset = 18.39 + (1.1 * seasonOffset); 

            let rH = Math.floor(sunrise), rM = Math.floor((sunrise % 1) * 60);
            let sH = Math.floor(sunset), sM = Math.floor((sunset % 1) * 60);
            let sunriseStr = `${String(rH).padStart(2, '0')}:${String(rM).padStart(2, '0')}`;
            let sunsetStr = `${String(sH).padStart(2, '0')}:${String(sM).padStart(2, '0')}`;

            const timeLabel = timeSlider.previousElementSibling || document.querySelector('label[for="timeSlider"]') || timeSlider.parentElement.querySelector('label');
            if (timeLabel) {
                timeLabel.innerHTML = `4. Celestial Time (<span id="timeVal">${timeVal.innerText}</span>) <span style="color: var(--accent-color); font-size: 10px; margin-left: 8px; font-weight: normal; letter-spacing: 0;">[日の出 ${sunriseStr} / 日の入り ${sunsetStr}]</span>`;
            }

            draw(parseFloat(slider.value));
        });

        // 初期化実行トリガー
        monthSlider.dispatchEvent(new Event('input'));

        function updateAgeDisplay(phase) {
            const maxCycle = 29.53;
            const centerAge = (phase / 28) * maxCycle;
            
            let minAge = centerAge - 0.5;
            let maxAge = centerAge + 0.5;

            if (minAge < 0) {
                const part1Min = minAge + maxCycle;
                const part1Max = maxCycle;
                const part2Min = 0.0;
                const part2Max = maxAge;
                ageRangeVal.innerText = `${part1Min.toFixed(1)}〜${part1Max.toFixed(1)} , ${part2Min.toFixed(1)}〜${part2Max.toFixed(1)}`;
            } else if (maxAge > maxCycle) {
                const part1Min = minAge;
                const part1Max = maxCycle;
                const part2Min = 0.0;
                const part2Max = maxAge - maxCycle;
                ageRangeVal.innerText = `${part1Min.toFixed(1)}〜${part1Max.toFixed(1)} , ${part2Min.toFixed(1)}〜${part2Max.toFixed(1)}`;
            } else {
                ageRangeVal.innerText = `${minAge.toFixed(1)} 〜 ${maxAge.toFixed(1)}`;
            }
        }


        // 【完全決着版】地上観測（北緯35度）のリアルな位置角計算
        function calculateMoonTilt(phase, timeHourMapped) {
            // 1. 伸縮させた時間ではなく、スライダーの生の「時計時間」を取得
            const timeHour = parseFloat(timeSlider.value);

            // 2. 南中時刻（Culmination Time）の正確な算出
            // 新月(Phase 0)は昼の12時、満月(Phase 14)は夜の24時に南中するように12時間をオフセット
            let culminationTime = 12.0 + (phase / 28.0) * 24.0;

            // 3. 時角（Hour Angle: 南中からの経過時間）の算出
            let hourAngleHours = timeHour - culminationTime;
            
            // -12 〜 +12 時間の範囲に正規化
            while (hourAngleHours <= -12) hourAngleHours += 24;
            while (hourAngleHours > 12) hourAngleHours -= 24;

            // 時角をラジアンに変換 (1時間 = 15度)
            let H = hourAngleHours * 15 * (Math.PI / 180);
            
            // 4. 季節（月）に応じた月の赤緯（高さ）を計算
            let month = parseInt(monthSlider.value);
            let lambdaSun = ((month - 3.2) / 12) * 2 * Math.PI; 
            let decSun = 23.44 * Math.sin(lambdaSun) * (Math.PI / 180);
            let phaseRad = (phase / 28) * 2 * Math.PI;
            let decMoon = -decSun * Math.cos(phaseRad); 

            let lat = 35 * (Math.PI / 180); // 北緯35度

            // 5. 球面三角法による天頂位置角 (Parallactic Angle) の純粋な計算
            let denom = Math.tan(lat) * Math.cos(decMoon) - Math.sin(decMoon) * Math.cos(H);
            let parallacticAngle = 0;
            if (Math.abs(denom) > 0.0001) {
                parallacticAngle = Math.atan2(Math.sin(H), denom);
            }

            // 余計な補正は一切不要。純粋な位置角をそのまま返すだけで、
            // 東（耳が上）→ 南中（右にゴロッと寝る）→ 西（さらに右へ倒れる）の
            // 完璧な時計回り（合計110度前後）が再現されます。
            return parallacticAngle;
        }

        // 昼夜の長さに同期した環境色調
        function getSkyColor(hour) {
            let month = parseInt(monthSlider.value);
            let seasonOffset = Math.sin(((month - 3.2) / 12) * 2 * Math.PI); 
            let sunrise = 5.61 - (1.1 * seasonOffset); 
            let sunset = 18.39 + (1.1 * seasonOffset); 

            const stops = [
                { h: 0,           r: 50,  g: 60,  b: 90 },
                { h: sunrise - 1.5, r: 50,  g: 70,  b: 100 },
                { h: sunrise,     r: 50,  g: 70,  b: 120 },
                { h: sunrise + 0.5, r: 60,  g: 70,  b: 150 },
                { h: sunrise + 2.0, r: 100, g: 150, b: 210 },
                { h: 12.0,        r: 160, g: 215, b: 255 }, 
                { h: sunset - 2.0,  r: 100, g: 150, b: 210 },
                { h: sunset - 0.5,  r: 60,  g: 70,  b: 150 },
                { h: sunset,      r: 50,  g: 70,  b: 120 },
                { h: sunset + 1.5,  r: 50,  g: 70,  b: 100 },
                { h: 24,          r: 50,  g: 60,  b: 90 }
            ];

            let start = stops[0], end = stops[stops.length - 1];
            for (let i = 0; i < stops.length - 1; i++) {
                if (hour >= stops[i].h && hour <= stops[i+1].h) {
                    start = stops[i];
                    end = stops[i+1];
                    break;
                }
            }

            const range = end.h - start.h;
            const progress = range === 0 ? 0 : (hour - start.h) / range;

            const r = Math.round(start.r + (end.r - start.r) * progress);
            const g = Math.round(start.g + (end.g - start.g) * progress);
            const b = Math.round(start.b + (end.b - start.b) * progress);

            return `rgb(${r}, ${g}, ${b})`;
        }

        // ノンリニア時間変換（伸縮マッピング用）
        function getMappedHour(timeHour) {
            let month = parseInt(monthSlider.value);
            let seasonOffset = Math.sin(((month - 3.2) / 12) * 2 * Math.PI); 
            let sunrise = 5.61 - (1.1 * seasonOffset); 
            let sunset = 18.39 + (1.1 * seasonOffset); 

            if (timeHour >= 12.0 && timeHour < sunset) {
                let pct = (timeHour - 12.0) / (sunset - 12.0);
                return 12.0 + (pct * 6.0);
            } else if (timeHour >= sunset && timeHour < 24.0) {
                let pct = (timeHour - sunset) / (24.0 - sunset);
                return 18.0 + (pct * 6.0);
            } else if (timeHour >= 0.0 && timeHour < sunrise) {
                let pct = (timeHour - 0.0) / (sunrise - 0.0);
                return 0.0 + (pct * 6.0);
            } else {
                let pct = (timeHour - sunrise) / (12.0 - sunrise);
                return 6.0 + (pct * 6.0);
            }
        }

        function drawSimulator(phase, timeHour) {
            const w = simCanvas.width;
            const h = simCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const rSun = (w / 2) - 80;
            const rMoon = rSun * 0.75;

            simCtx.clearRect(0, 0, w, h);

            let timeHourMapped = getMappedHour(timeHour);

            simCtx.beginPath();
            simCtx.arc(cx, cy, rSun + 50, 0, Math.PI * 2);
            simCtx.fillStyle = getSkyColor(timeHour);
            simCtx.fill();

            simCtx.beginPath();
            simCtx.arc(cx, cy, rSun + 50, 0, Math.PI); 
            simCtx.fillStyle = 'rgba(15, 20, 30, 0.4)'; 
            simCtx.fill();

            simCtx.beginPath();
            simCtx.arc(cx, cy, rSun, 0, Math.PI * 2);
            simCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            simCtx.stroke();
            simCtx.beginPath();
            simCtx.arc(cx, cy, rMoon, 0, Math.PI * 2);
            simCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            simCtx.stroke();

            const sunAngleRad = (timeHourMapped - 18) * 15 * (Math.PI / 180);
            const sunPos = {
                x: cx + rSun * Math.cos(sunAngleRad),
                y: cy + rSun * Math.sin(sunAngleRad)
            };

            const moonAngleRad = sunAngleRad - (phase / 28) * 2 * Math.PI;
            const moonPos = {
                x: cx + rMoon * Math.cos(moonAngleRad),
                y: cy + rMoon * Math.sin(moonAngleRad)
            };

            simCtx.beginPath();
            simCtx.moveTo(sunPos.x, sunPos.y);
            simCtx.lineTo(moonPos.x, moonPos.y);
            simCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            simCtx.setLineDash([8, 8]);
            simCtx.stroke();
            simCtx.setLineDash([]);

            const currentTiltRad = calculateMoonTilt(phase, timeHourMapped);
            simCtx.save();
            simCtx.translate(moonPos.x, moonPos.y);
            simCtx.rotate(currentTiltRad);
            
            let isMoonInShadow = moonPos.y > cy;

            simCtx.beginPath();
            simCtx.arc(0, 0, 16, 0, Math.PI * 2);
            simCtx.fillStyle = isMoonInShadow ? '#0b0c10' : '#1f2833';
            simCtx.fill();
            simCtx.strokeStyle = isMoonInShadow ? '#444' : '#fff';
            simCtx.stroke();

            simCtx.beginPath();
            simCtx.moveTo(0, 0);
            simCtx.lineTo(0, -16);
            simCtx.strokeStyle = 'rgba(197, 160, 89, 0.9)';
            simCtx.lineWidth = 2;
            simCtx.stroke();
            simCtx.restore();

            let isSunInShadow = sunPos.y > cy;
            simCtx.beginPath();
            simCtx.arc(sunPos.x, sunPos.y, 20, 0, Math.PI * 2);
            simCtx.fillStyle = isSunInShadow ? '#66532d' : '#f9d71c';
            simCtx.fill();
            if (!isSunInShadow) {
                simCtx.shadowColor = '#f9d71c';
                simCtx.shadowBlur = 20;
                simCtx.fill();
                simCtx.shadowBlur = 0;
            }
        }

        // メインキャンバス描画コアシステム（時間軸・Glow完全連動版）
        function draw(step) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = (Math.min(canvas.width, canvas.height) / 2) * 0.87; 
            const glowRatio = parseInt(glowSlider.value) / 100;
            const timeHour = parseFloat(timeSlider.value);
            const shouldRotateTexture = rotateTextureCheckbox.checked;

            let timeHourMapped = getMappedHour(timeHour);

            const tiltRad = calculateMoonTilt(step, timeHourMapped);
            let tiltDeg = (tiltRad * (180 / Math.PI)) % 360;
            if (tiltDeg < 0) tiltDeg += 360;
            tiltAngleVal.innerText = tiltDeg.toFixed(1);

            drawSimulator(step, timeHour);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (glowRatio === 0 && step === 0) {
                return;
            }

            function pathMoon(context) {
                const radians = step * (Math.PI / 14);
                const phase = -Math.cos(radians);
                const isWaxing = step <= 14; 
                
                context.beginPath();
                context.arc(cx, cy, r, -Math.PI/2, Math.PI/2, !isWaxing);
                context.ellipse(cx, cy, Math.abs(phase) * r, r, 0, Math.PI/2, -Math.PI/2, isWaxing ? (phase < 0) : (phase > 0));
                context.closePath();
            }

            const imgBuffer = document.createElement('canvas');
            imgBuffer.width = canvas.width;
            imgBuffer.height = canvas.height;
            const ictx = imgBuffer.getContext('2d');

            if (userImage) {
                const moonDiameter = r * 2;
                const imgRatio = userImage.width / userImage.height;
                let renderW, renderH;

                if (imgRatio > 1) {
                    renderH = moonDiameter;
                    renderW = moonDiameter * imgRatio;
                } else {
                    renderW = moonDiameter;
                    renderH = moonDiameter / imgRatio;
                }

                ictx.save();
                if (shouldRotateTexture) {
                    ictx.translate(cx, cy);
                    ictx.rotate(tiltRad);
                    ictx.translate(-cx, -cy);
                }
                ictx.drawImage(userImage, cx - renderW / 2, cy - renderH / 2, renderW, renderH);
                ictx.restore();
                
            } else {
                ictx.fillStyle = '#1f2833';
                ictx.fillRect(0, 0, canvas.width, canvas.height);
                ictx.fillStyle = '#666';
                ictx.font = `${Math.min(canvas.width, canvas.height) * 0.025}px sans-serif`;
                ictx.textAlign = 'center';
                ictx.textBaseline = 'middle';
                ictx.fillText('Source Image Missing', cx, cy);
            }

            if (colorSimCheckbox.checked) {
                ictx.save();
                
                let moonHour = timeHourMapped - (step / 28) * 24;
                while (moonHour < 0) moonHour += 24;
                while (moonHour >= 24) moonHour -= 24;

                const moonAngleRad = (moonHour - 18) * 15 * (Math.PI / 180);
                const sunAngleRad = (timeHourMapped - 18) * 15 * (Math.PI / 180);
                
                const moonY = Math.sin(moonAngleRad); 
                const sunY = Math.sin(sunAngleRad);   

                ictx.globalCompositeOperation = 'source-atop';
                
                if (moonY > 0) {
                    ictx.fillStyle = 'rgba(15, 15, 15, 0.5)';
                } else if (sunY > 0) {
                    ictx.fillStyle = 'rgba(255, 240, 150, 0.5)';
                } else {
                    ictx.fillStyle = 'rgba(240, 240, 240, 0.6)';
                }
                
                ictx.fillRect(0, 0, canvas.width, canvas.height);
                ictx.restore();
            }

            if (step === 0) {
                ctx.save();
                const maskCtx = imgBuffer.getContext('2d');
                maskCtx.globalCompositeOperation = 'destination-in';
                maskCtx.beginPath();
                maskCtx.arc(cx, cy, r, 0, Math.PI * 2);
                maskCtx.fill();

                const dynamicBlur1 = (r / 1100) * 80 * glowRatio;
                if (dynamicBlur1 > 0) {
                    ctx.filter = `blur(${dynamicBlur1}px)`; 
                }
                ctx.drawImage(imgBuffer, 0, 0); 
                ctx.restore();

                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(cx, cy, r - ((r / 1100) * 5), 0, Math.PI * 2); 
                ctx.fill();
                ctx.restore();
                return;
            }

            const shadowBuffer = document.createElement('canvas');
            shadowBuffer.width = canvas.width;
            shadowBuffer.height = canvas.height;
            const sctx = shadowBuffer.getContext('2d');
            
            sctx.drawImage(imgBuffer, 0, 0);
            sctx.globalCompositeOperation = 'destination-in';
            
            sctx.save();
            sctx.translate(cx, cy);
            sctx.rotate(tiltRad);
            sctx.translate(-cx, -cy);
            
            pathMoon(sctx);
            sctx.fillStyle = '#ffffff';
            sctx.fill();
            sctx.restore();

            const dynamicBlur2 = (r / 1100) * 60 * glowRatio;
            if (dynamicBlur2 > 0) {
                ctx.save();
                ctx.filter = `blur(${dynamicBlur2}px)`; 
                ctx.drawImage(shadowBuffer, 0, 0);
                ctx.restore();
            }

            ctx.drawImage(shadowBuffer, 0, 0);
        }

        // 【復旧】ダウンロード用コア処理システム
        function triggerDownload(url, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = url;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 【復旧】現在のフェーズ単体保存処理
        downloadBtn.addEventListener('click', () => {
            const currentStep = parseFloat(slider.value);
            const currentTime = parseFloat(timeSlider.value);
            const dataUrl = canvas.toDataURL('image/png');
            const fileSuffix = String(currentStep.toFixed(1)).replace('.', '_');
            const timeSuffix = String(currentTime.toFixed(1)).replace('.', '_');
            triggerDownload(dataUrl, `moon_phase_${fileSuffix}_t${timeSuffix}.png`);
        });

        // 28段階マトリックスZIP出力（Glow維持・回転＆カラー排除）
        bulkDownloadBtn.addEventListener('click', async () => {
            progressOverlay.style.display = 'flex';
            const zip = new JSZip();
            const currentSelectedStep = parseFloat(slider.value);

            function drawPurePhase(step) {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const r = (Math.min(canvas.width, canvas.height) / 2) * 0.87; 
                const glowRatio = parseInt(glowSlider.value) / 100;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (glowRatio === 0 && step === 0) return;

                function pathMoonPure(context) {
                    const radians = step * (Math.PI / 14);
                    const phase = -Math.cos(radians);
                    const isWaxing = step <= 14; 
                    
                    context.beginPath();
                    context.arc(cx, cy, r, -Math.PI/2, Math.PI/2, !isWaxing);
                    context.ellipse(cx, cy, Math.abs(phase) * r, r, 0, Math.PI/2, -Math.PI/2, isWaxing ? (phase < 0) : (phase > 0));
                    context.closePath();
                }

                const imgBuffer = document.createElement('canvas');
                imgBuffer.width = canvas.width;
                imgBuffer.height = canvas.height;
                const ictx = imgBuffer.getContext('2d');

                if (userImage) {
                    const moonDiameter = r * 2;
                    const imgRatio = userImage.width / userImage.height;
                    let renderW, renderH;

                    if (imgRatio > 1) {
                        renderH = moonDiameter;
                        renderW = moonDiameter * imgRatio;
                    } else {
                        renderW = moonDiameter;
                        renderH = moonDiameter / imgRatio;
                    }
                    ictx.drawImage(userImage, cx - renderW / 2, cy - renderH / 2, renderW, renderH);
                } else {
                    ictx.fillStyle = '#1f2833';
                    ictx.fillRect(0, 0, canvas.width, canvas.height);
                }

                if (step === 0) {
                    ctx.save();
                    const maskCtx = imgBuffer.getContext('2d');
                    maskCtx.globalCompositeOperation = 'destination-in';
                    maskCtx.beginPath();
                    maskCtx.arc(cx, cy, r, 0, Math.PI * 2);
                    maskCtx.fill();

                    const dynamicBlur1 = (r / 1100) * 80 * glowRatio;
                    if (dynamicBlur1 > 0) {
                        ctx.filter = `blur(${dynamicBlur1}px)`; 
                    }
                    ctx.drawImage(imgBuffer, 0, 0); 
                    ctx.restore();

                    ctx.save();
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath();
                    ctx.arc(cx, cy, r - ((r / 1100) * 5), 0, Math.PI * 2); 
                    ctx.fill();
                    ctx.restore();
                    return;
                }

                const shadowBuffer = document.createElement('canvas');
                shadowBuffer.width = canvas.width;
                shadowBuffer.height = canvas.height;
                const sctx = shadowBuffer.getContext('2d');
                
                sctx.drawImage(imgBuffer, 0, 0);
                sctx.globalCompositeOperation = 'destination-in';
                
                pathMoonPure(sctx);
                sctx.fillStyle = '#ffffff';
                sctx.fill();

                const dynamicBlur2 = (r / 1100) * 60 * glowRatio;
                if (dynamicBlur2 > 0) {
                    ctx.save();
                    ctx.filter = `blur(${dynamicBlur2}px)`; 
                    ctx.drawImage(shadowBuffer, 0, 0);
                    ctx.restore();
                }

                ctx.drawImage(shadowBuffer, 0, 0);
            }

            for (let i = 0; i <= 27; i++) {
                progressText.innerText = `Generating Default Moon Phases...\nPhase ${i} / 27`;
                drawPurePhase(i);
                
                const dataUrl = canvas.toDataURL('image/png');
                const base64Data = dataUrl.split(',')[1];
                zip.file(`moon_phase_${String(i).padStart(2, '0')}.png`, base64Data, {base64: true});
                
                await new Promise(resolve => setTimeout(resolve, 60));
            }

            draw(currentSelectedStep);

            progressText.innerText = `Archiving ZIP File...\nPlease wait.`;
            const content = await zip.generateAsync({type: 'blob'});
            
            const blobUrl = URL.createObjectURL(content);
            triggerDownload(blobUrl, `moon_phase_28_matrix.zip`);
            
            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
            progressOverlay.style.display = 'none';
        });

        // 直接ドラッグハンドラ
        let isDragging = false;
        let lastMouseX = 0;

        function handlePointerMove(e) {
            if (!isDragging) return;
            e.preventDefault();

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = clientX - lastMouseX;
            const rotationSpeed = 0.5; 
            const angleChange = deltaX * rotationSpeed * (Math.PI / 180);
            
            let currentHour = parseFloat(timeSlider.value);
            let currentAngle = (currentHour - 12) * (Math.PI / 12);
            let newAngle = currentAngle + angleChange;
            
            let newHour = 12 + (newAngle * (12 / Math.PI));
            newHour = (newHour + 24) % 24;

            timeSlider.value = newHour;
            const hours = Math.floor(newHour);
            const minutes = Math.floor((newHour % 1) * 60);
            
            const targetTimeVal = document.getElementById('timeVal');
            if (targetTimeVal) {
                targetTimeVal.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            }
            timeVal.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            draw(parseFloat(slider.value));
            lastMouseX = clientX;
        }

        simCanvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) handlePointerMove(e);
        });
        
        window.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        simCanvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastMouseX = e.touches[0].clientX;
            e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        window.addEventListener('touchmove', (e) => {
            if (isDragging) handlePointerMove(e);
            e.preventDefault();
        }, {passive: false});
    </script>
</body>
